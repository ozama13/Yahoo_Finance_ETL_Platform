name: analytics_platform
version: '1.0.0'
config-version: 2

profile: analytics_platform

model-paths:      ["models"]
analysis-paths:   ["analyses"]
test-paths:       ["tests"]
seed-paths:       ["seeds"]
macro-paths:      ["macros"]
snapshot-paths:   ["snapshots"]

target-path:      "target"
clean-targets:    ["target", "dbt_packages"]

models:
  analytics_platform:

    staging:
      +materialized: view          # staging is always views
      +schema: staging
      +tags: ["staging"]

    intermediate:
      +materialized: view     # intermediate never persists
      +tags: ["intermediate"]

    marts:
      +materialized: table         # marts default to tables
      +schema: marts
      +tags: ["marts"]

      sales:
        +tags: ["sales"]
      finance:
        +tags: ["finance"]
      product:
        +tags: ["product"]
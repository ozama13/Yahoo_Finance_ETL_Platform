name: dbt CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dbt-ci:
    runs-on: ubuntu-latest

    env:
      SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
      SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install dbt-snowflake

      - name: Create profiles.yml
        run: |
          mkdir -p ~/.dbt
          echo "analytics_platform:" > ~/.dbt/profiles.yml
          echo "  target: ci" >> ~/.dbt/profiles.yml
          echo "  outputs:" >> ~/.dbt/profiles.yml
          echo "    ci:" >> ~/.dbt/profiles.yml
          echo "      type: snowflake" >> ~/.dbt/profiles.yml
          echo "      account: ${SNOWFLAKE_ACCOUNT}" >> ~/.dbt/profiles.yml
          echo "      user: ${SNOWFLAKE_USER}" >> ~/.dbt/profiles.yml
          echo "      password: ${SNOWFLAKE_PASSWORD}" >> ~/.dbt/profiles.yml
          echo "      role: DBT_CI" >> ~/.dbt/profiles.yml
          echo "      warehouse: DBT_WH" >> ~/.dbt/profiles.yml
          echo "      database: STAGING" >> ~/.dbt/profiles.yml
          echo "      schema: dbt_ci" >> ~/.dbt/profiles.yml
          echo "      threads: 4" >> ~/.dbt/profiles.yml

      - name: dbt deps
        run: dbt deps

      - name: dbt compile
        run: dbt compile

      - name: dbt run
        run: dbt run

      - name: dbt test
        run: dbt test

      - name: dbt docs generate
        run: dbt docs generate

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: dbt-docs
          path: target/

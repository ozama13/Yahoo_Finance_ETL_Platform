version: 2

models:
  - name: fct_stock_prices
    description: "Daily stock price fact table with financial metrics and signals"
    columns:
      - name: stock_price_id
        description: "Surrogate key — date + ticker"
        tests:
          - unique
          - not_null
      - name: price_date
        tests:
          - not_null
      - name: ticker
        tests:
          - not_null
      - name: close_price
        tests:
          - not_null
      - name: momentum_signal
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['above_ma30', 'below_ma30', 'at_ma30']
      - name: daily_return_category
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['strong_up', 'up', 'flat', 'down', 'strong_down']

  - name: dim_tickers
    description: "One row per ticker with summary statistics"
    columns:
      - name: ticker_id
        tests:
          - unique
          - not_null
      - name: ticker
        tests:
          - unique
          - not_null
      - name: company_name
        tests:
          - not_null
      - name: latest_close_price
        tests:
          - not_null
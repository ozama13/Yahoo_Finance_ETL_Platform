version: 2

models:
  - name: stg_stock_prices
    description: "Cleaned and renamed stock prices from Yahoo Finance raw layer"
    columns:
      - name: price_date
        description: "Trading date"
        tests:
          - not_null
      - name: ticker
        description: "Stock ticker symbol"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['AAPL', 'GOOGL', 'MSFT', 'AMZN', 'META']
      - name: close_price
        tests:
          - not_null
      - name: volume
        tests:
          - not_null